urce":"/**\n * Tests for the sliding-window rate limiter. Boundary-exact (allow Nth / deny N+1th), refill\n * after injected time advance, per-tenant aggregate denial across shoppers, tenant independence,\n * and a property that the cap is never exceeded in any window.\n */\nimport { describe, expect, it } from 'vitest';\nimport fc from 'fast-check';\nimport {\n  InMemoryRateLimitStore,\n  RateLimiter,\n  type Clock,\n} from './rate-limit.js';\n\n/** A clock whose time the test moves explicitly — no wall-clock dependency. */\nclass FakeClock implements Clock {\n  constructor(private t = 0) {}\n  now(): number {\n    return this.t;\n  }\n  advance(ms: number): void {\n    this.t += ms;\n  }\n}\n\nconst limits = (perShopper: number, perTenant: number) =>\n  ({\n    tenantId: 't1',\n    shopperId: 's1',\n    perShopperPerMinute: perShopper,\n    perTenantPerMinute: perTenant,\n  }) as const;\n\ndescribe('per-shopper boundary', () => {\n  it('allows exactly N then denies the N+1th in the same window', () => {\n    const clock = new FakeClock();\n    const rl = new RateLimiter(clock);\n    for (let i = 0; i <"+" 3; i++) {\n      expect(rl.check(limits(3, 100)).allowed).toBe(true);\n    }\n    const denied = rl.check(limits(3, 100));\n    expect(denied.allowed).toBe(false);\n    expect(denied.retryAfterMs).toBeGreaterThan(0);\n    expect(denied.retryAfterMs).toBeLessThanOrEqual(60_000);\n  });\n\n  it('refills after the window fully advances (injected clock)', () => {\n    const clock = new FakeClock();\n    const rl = new RateLimiter(clock);\n    for (let i = 0; i <"+" 2; i++) rl.check(limits(2, 100));\n    expect(rl.check(limits(2, 100)).allowed).toBe(false);\n    // Advance just past the 60s window so the oldest hit drops out.\n    clock.advance(60_001);\n    expect(rl.check(limits(2, 100)).allowed).toBe(true);\n  });\n\n  it('does not refill one millisecond before the window closes', () => {\n    const clock = new FakeClock();\n    const rl = new RateLimiter(clock);\n    rl.check(limits(1, 100)); // hit at t=0\n    clock.advance(60_000); // exactly the window: t=0 is at the cutoff, pruned only when t > cutoff\n    // cutoff = now - 60000 = 0, prune keeps t > 0, so the t=0 hit is dropped -> allowed.\n    expect(rl.check(limits(1, 100)).allowed).toBe(true);\n  });\n});\n\ndescribe('per-tenant aggregate cap (threat D2)', () => {\n  it('denies a second shopper once the tenant cap is hit even with per-shopper headroom', () => {\n    const clock = new FakeClock();\n    const rl = new RateLimiter(clock);\n    // Tenant cap 2; per-shopper cap 10 (lots of headroom). Two distinct shoppers fill the tenant.\n    const mk = (shopper: string) => ({\n      tenantId: 't1',\n      shopperId: shopper,\n      perShopperPerMinute: 10,\n      perTenantPerMinute: 2,\n    });\n    expect(rl.check(mk('sA')).allowed).toBe(true);\n    expect(rl.check(mk('sB')).allowed).toBe(true);\n    // sC has full per-shopper headroom but the tenant aggregate is exhausted.\n    const denied = rl.check(mk('sC'));\n    expect(denied.allowed).toBe(false);\n    expect(denied.retryAfterMs).toBeGreaterThan(0);\n  });\n\n  it('does not record a denied request against either bucket', () => {\n    const clock = new FakeClock();\n    const store = new InMemoryRateLimitStore();\n    const rl = new RateLimiter(clock, store);\n    rl.check(limits(1, 100)); // shopper now at 1/1\n    rl.check(limits(1, 100)); // denied — must not bump counts\n    // Tenant bucket should hold exactly one (the allowed) hit, not two.\n    expect(store.get('t:t1')).toHaveLength(1);\n    expect(store.get('s:t1:s1')).toHaveLength(1);\n  });\n});\n\ndescribe('tenant independence', () => {\n  it('one tenant hitting its cap does not affect another tenant', () => {\n    const clock = new FakeClock();\n    const rl = new RateLimiter(clock);\n    const t1 = { tenantId: 't1', shopperId: 's', perShopperPerMinute: 1, perTenantPerMinute: 1 };\n    const t2 = { tenantId: 't2', shopperId: 's', perShopperPerMinute: 1, perTenantPerMinute: 1 };\n    expect(rl.check(t1).allowed).toBe(true);\n    expect(rl.check(t1).allowed).toBe(false);\n    expect(rl.check(t2).allowed).toBe(true); // t2 is unaffected\n  });\n});\n\ndescribe('fail-closed sizing', () => {\n  it('denies all traffic when a cap is zero or negative', () => {\n    const clock = new FakeClock();\n    const rl = new RateLimiter(clock);\n    expect(rl.check(limits(0, 100)).allowed).toBe(false);\n    expect(rl.check(limits(100, 0)).allowed).toBe(false);\n    expect(rl.check(limits(-5, 100)).allowed).toBe(false);\n  });\n});\n\ndescribe('property: never allows more than the cap in any window', () => {\n  it('the number of allowed requests within one window never exceeds min(caps)', () => {\n    fc.assert(\n      fc.property(\n        fc.integer({ min: 1, max: 8 }),\n        fc.integer({ min: 1, max: 8 }),\n        fc.integer({ min: 1, max: 40 }),\n        (perShopper, perTenant, attempts) => {\n          const clock = new FakeClock();\n          const rl = new RateLimiter(clock);\n          let allowed = 0;\n          for (let i = 0; i <"+" attempts; i++) {\n            // small advances, all well inside one 60s window\n            clock.advance(10);\n            if (rl.check(limits(perShopper, perTenant)).allowed) allowed++;\n          }\n          const cap = Math.min(perShopper, perTenant);\n          return allowed <"+"= cap;\n        },\n      ),\n      { numRuns: 300 },\n    );\n  });\n});\n"},"src/api-key-auth.mutation.test.ts":{"tests":[{"id":"121","name":"KDF known-answer vector (kills salt-encoding and scrypt-param mutants) verifies the genuine plaintext against the precomputed scrypt hash"},{"id":"122","name":"KDF known-answer vector (kills salt-encoding and scrypt-param mutants) rejects a near-miss plaintext against the same fixed vector"},{"id":"123","name":"malformed-record typeof guards (kills the false-ing of the typeof arms) refuses a record whose salt is an array, not a string (reason stays malformed)"},{"id":"124","name":"malformed-record typeof guards (kills the false-ing of the typeof arms) refuses a record whose hash is an array, not a string (reason stays malformed)"},{"id":"125","name":"malformed-record typeof guards (kills the false-ing of the typeof arms) refuses a Buffer plaintext even when it would derive the genuine hash"},{"id":"126","name":"createApiKey expiry-spread path (kills the L118 conditional) omits expiresAt entirely when none is supplied"},{"id":"127","name":"createApiKey expiry-spread path (kills the L118 conditional) includes expiresAt verbatim when supplied"}],"source":"/**\n * Mutation-hardening tests for tenant-scoped API-key verification.\n *\n * The round-trip tests cannot catch mutations to the KDF itself (both mint and verify use the\n * same code, so a mutated salt-encoding or scrypt parameter still self-consistently verifies).\n * Here we pin a FIXED known-answer vector — a literal plaintext + salt + precomputed scrypt hash\n * — so that mutating the `'hex'` salt decoding or the scrypt options object changes the derived\n * hash and breaks verification. We also exercise the non-string `typeof` guards and the\n * no-expiry spread path that the existing suite leaves untested. Boundary-exact, real teeth.\n */\nimport { describe, expect, it } from 'vitest';\nimport { createApiKey, verifyApiKey, type ApiKeyRecord } from './api-key-auth.js';\n\nconst TENANT = 'tenant-a';\n\n/**\n * Known-answer vector: scrypt(plaintext, salt, 32, {N:2^15, r:8, p:1}) precomputed with the exact\n * parameters this module declares. If deriveHash mutates the salt encoding (`'hex' -> ''`) or the\n * options object (`{...} -> {}`, which would fall back to scrypt's default N=16384), the derived\n * hash will not equal this stored vector and verification flips to `mismatch` — killing the mutant.\n */\nconst FIXED = {\n  plaintext: 'known-plaintext-secret',\n  salt: '00112233445566778899aabbccddeeff',\n  hash: '0fc7f1e64d48a2e08c8aaf308eeca13de603ba8f0e791776bba33dd23e7d7363',\n} as const;\n\nconst fixedRecord = (): ApiKeyRecord => ({\n  keyId: 'kid-fixed',\n  tenantId: TENANT,\n  scopes: [],\n  salt: FIXED.salt,\n  hash: FIXED.hash,\n});\n\ndescribe('KDF known-answer vector (kills salt-encoding and scrypt-param mutants)', () => {\n  it('verifies the genuine plaintext against the precomputed scrypt hash', () => {\n    expect(verifyApiKey(FIXED.plaintext, fixedRecord(), { tenantId: TENANT })).toEqual({\n      ok: true,\n    });\n  });\n\n  it('rejects a near-miss plaintext against the same fixed vector', () => {\n    // Any other plaintext derives a different hash; proves the vector is genuinely discriminating\n    // and not trivially accepted regardless of input.\n    expect(verifyApiKey('known-plaintext-secres', fixedRecord(), { tenantId: TENANT })).toEqual({\n      ok: false,\n      reason: 'mismatch',\n    });\n  });\n});\n\ndescribe('malformed-record typeof guards (kills the false-ing of the typeof arms)', () => {\n  // These use NON-STRING values that would NOT throw downstream if the guard were removed, so the\n  // only thing producing `malformed` is the typeof guard itself. A numeric value would throw in\n  // Buffer.from and be caught as malformed anyway (guard-redundant); an array decodes cleanly, so\n  // removing the guard yields `mismatch` instead — which these exact-reason assertions catch.\n\n  it('refuses a record whose salt is an array, not a string (reason stays malformed)', () => {\n    // Array salt: if the `typeof salt !== \"string\"` arm were neutralised, Buffer.from(array,\"hex\")\n    // succeeds and the derive runs to a mismatch — a different reason than malformed.\n    const bad = { ...fixedRecord(), salt: [0, 1, 2, 3] as unknown as string };\n    expect(verifyApiKey(FIXED.plaintext, bad, { tenantId: TENANT })).toEqual({\n      ok: false,\n      reason: 'malformed',\n    });\n  });\n\n  it('refuses a record whose hash is an array, not a string (reason stays malformed)', () => {\n    const bad = { ...fixedRecord(), hash: [1, 2, 3] as unknown as string };\n    expect(verifyApiKey(FIXED.plaintext, bad, { tenantId: TENANT })).toEqual({\n      ok: false,\n      reason: 'malformed',\n    });\n  });\n\n  it('refuses a Buffer plaintext even when it would derive the genuine hash', () => {\n    // Buffer.from(\"known-plaintext-secret\") is a valid scrypt password; if the plaintext typeof\n    // guard were removed it would derive the stored hash and WRONGLY return ok:true. The guard\n    // must refuse it as malformed because plaintext is not a string.\n    const bufPlaintext = Buffer.from(FIXED.plaintext, 'utf8') as unknown as string;\n    expect(verifyApiKey(bufPlaintext, fixedRecord(), { tenantId: TENANT })).toEqual({\n      ok: false,\n      reason: 'malformed',\n    });\n  });\n});\n\ndescribe('createApiKey expiry-spread path (kills the L118 conditional)', () => {\n  it('omits expiresAt entirely when none is supplied', () => {\n    const { record } = createApiKey({ tenantId: TENANT, scopes: [] });\n    // If the spread condition were forced true, the record would carry `expiresAt: undefined`.\n    expect('expiresAt' in record).toBe(false);\n    expect(Object.prototype.hasOwnProperty.call(record, 'expiresAt')).toBe(false);\n  });\n\n  it('includes expiresAt verbatim when supplied', () => {\n    const exp = '2099-01-01T00:00:00.000Z';\n    const { record } = createApiKey({ tenantId: TENANT, scopes: [], expiresAt: exp });\n    expect(record.expiresAt).toBe(exp);\n  });\n});\n"},"src/audit-log.test.ts":{"tests":[{"id":"128","name":"append-only interface shape exposes no update or delete method on the interface"},{"id":"129","name":"immutability and ordering preserves append order across multiple events"},{"id":"130","name":"immutability and ordering does not let a caller mutate the recorded trail via the returned list"},{"id":"131","name":"redaction of secret/PII-shaped fields blanks each secret-shaped key while preserving non-secret keys"},{"id":"132","name":"redaction of secret/PII-shaped fields redacts case-insensitively and inside nested objects and arrays"},{"id":"133","name":"redaction of secret/PII-shaped fields does not mutate the input object"},{"id":"134","name":"redaction of secret/PII-shaped fields leaves primitives and null unchanged"},{"id":"135","name":"redaction of secret/PII-shaped fields redacts before schema validation in redactAndValidateAuditEvent"},{"id":"136","name":"schema-invalid events refused (fail-closed) throws when a required field is missing"},{"id":"137","name":"schema-invalid events refused (fail-closed) throws when outcome is not in the allowed enum"},{"id":"138","name":"schema-invalid events refused (fail-closed) throws on a completely non-object input"}],"source":"/**\n * Tests for the append-only audit sink. Asserts immutability/ordering of stored events, that\n * secret-shaped fields are redacted before storage, and that schema-invalid events are refused.\n */\nimport { describe, expect, it } from 'vitest';\nimport {\n  InMemoryAuditSink,\n  redactAndValidateAuditEvent,\n  redactSecrets,\n  type AuditSink,\n} from './audit-log.js';\n\nconst baseEvent = () => ({\n  eventId: 'evt-1',\n  ts: '2026-01-01T00:00:00.000Z',\n  tenantId: 't1',\n  actor: 'key-abc',\n  action: 'tryon.create',\n  requestId: 'req-1',\n  outcome: 'allow' as const,\n});\n\ndescribe('append-only interface shape', () => {\n  it('exposes no update or delete method on the interface', () => {\n    const sink: AuditSink = new InMemoryAuditSink();\n    expect((sink as unknown as Record<"+"string, unknown>)['update']).toBeUndefined();\n    expect((sink as unknown as Record<"+"string, unknown>)['delete']).toBeUndefined();\n  });\n});\n\ndescribe('immutability and ordering', () => {\n  it('preserves append order across multiple events', () => {\n    const sink = new InMemoryAuditSink();\n    sink.append({ ...baseEvent(), eventId: 'a' });\n    sink.append({ ...baseEvent(), eventId: 'b' });\n    sink.append({ ...baseEvent(), eventId: 'c' });\n    expect(sink.list().map((e) => e.eventId)).toEqual(['a', 'b', 'c']);\n    expect(sink.size()).toBe(3);\n  });\n\n  it('does not let a caller mutate the recorded trail via the returned list', () => {\n    const sink = new InMemoryAuditSink();\n    sink.append(baseEvent());\n    const snapshot = sink.list() as unknown as unknown[];\n    snapshot.push({ tampered: true }); // mutate the returned array\n    snapshot.length = 0; // try to clear it\n    expect(sink.size()).toBe(1); // backing store is untouched\n  });\n});\n\ndescribe('redaction of secret/PII-shaped fields', () => {\n  it('blanks each secret-shaped key while preserving non-secret keys', () => {\n    const out = redactSecrets({\n      apiKey: 'ak_live_123',\n      plaintext: 'raw-secret',\n      token: 'jwt.abc.def',\n      authorization: 'Bearer xyz',\n      password: 'hunter2',\n      data: 'iVBORw0base64image==',\n      keepMe: 'visible-value',\n    }) as Record<"+"string, unknown>;\n    expect(out['apiKey']).toBe('[REDACTED]');\n    expect(out['plaintext']).toBe('[REDACTED]');\n    expect(out['token']).toBe('[REDACTED]');\n    expect(out['authorization']).toBe('[REDACTED]');\n    expect(out['password']).toBe('[REDACTED]');\n    expect(out['data']).toBe('[REDACTED]');\n    expect(out['keepMe']).toBe('visible-value'); // non-secret survives untouched\n  });\n\n  it('redacts case-insensitively and inside nested objects and arrays', () => {\n    const out = redactSecrets({\n      level1: { APIKEY: 'x', items: [{ Secret: 's1' }, { Secret: 's2' }] },\n    }) as Record<"+"string, Record<"+"string, unknown>>;\n    expect(out['level1']!['APIKEY']).toBe('[REDACTED]');\n    const items = out['level1']!['items'] as Array<"+"Record<"+"string, unknown>>;\n    expect(items[0]!['Secret']).toBe('[REDACTED]');\n    expect(items[1]!['Secret']).toBe('[REDACTED]');\n  });\n\n  it('does not mutate the input object', () => {\n    const input = { apiKey: 'secret', keep: 1 };\n    const out = redactSecrets(input) as Record<"+"string, unknown>;\n    expect(input.apiKey).toBe('secret'); // original untouched\n    expect(out['apiKey']).toBe('[REDACTED]');\n  });\n\n  it('leaves primitives and null unchanged', () => {\n    expect(redactSecrets(42)).toBe(42);\n    expect(redactSecrets('plain')).toBe('plain');\n    expect(redactSecrets(null)).toBeNull();\n  });\n\n  it('redacts before schema validation in redactAndValidateAuditEvent', () => {\n    // `data` is an inline-image key; the schema strips it, but redaction proves the policy ran.\n    const stored = redactAndValidateAuditEvent(baseEvent());\n    expect(stored.eventId).toBe('evt-1');\n    expect(stored.actor).toBe('key-abc');\n  });\n});\n\ndescribe('schema-invalid events refused (fail-closed)', () => {\n  it('throws when a required field is missing', () => {\n    const sink = new InMemoryAuditSink();\n    const { eventId: _drop, ...incomplete } = baseEvent();\n    expect(() => sink.append(incomplete)).toThrow();\n    expect(sink.size()).toBe(0); // nothing was appended\n  });\n\n  it('throws when outcome is not in the allowed enum', () => {\n    const sink = new InMemoryAuditSink();\n    expect(() => sink.append({ ...baseEvent(), outcome: 'maybe' })).toThrow();\n    expect(sink.size()).toBe(0);\n  });\n\n  it('throws on a completely non-object input', () => {\n    const sink = new InMemoryAuditSink();\n    expect(() => sink.append('not-an-event')).toThrow();\n    expect(() => sink.append(null)).toThrow();\n    expect(sink.size()).toBe(0);\n  });\n});\n"},"src/audit-log.mutation.test.ts":{"tests":[{"id":"139","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"apikey\" key"},{"id":"140","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"apikeyplaintext\" key"},{"id":"141","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"plaintext\" key"},{"id":"142","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"secret\" key"},{"id":"143","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"token\" key"},{"id":"144","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"authorization\" key"},{"id":"145","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"password\" key"},{"id":"146","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"data\" key"},{"id":"147","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"imagedata\" key"},{"id":"148","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"bytes\" key"},{"id":"149","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"apikey\" key case-insensitively (upper-case)"},{"id":"150","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"apikeyplaintext\" key case-insensitively (upper-case)"},{"id":"151","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"plaintext\" key case-insensitively (upper-case)"},{"id":"152","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"secret\" key case-insensitively (upper-case)"},{"id":"153","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"token\" key case-insensitively (upper-case)"},{"id":"154","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"authorization\" key case-insensitively (upper-case)"},{"id":"155","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"password\" key case-insensitively (upper-case)"},{"id":"156","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"data\" key case-insensitively (upper-case)"},{"id":"157","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"imagedata\" key case-insensitively (upper-case)"},{"id":"158","name":"every REDACT_KEYS entry is enforced (kills blanked-literal mutants) redacts the \"bytes\" key case-insensitively (upper-case)"},{"id":"159","name":"array handling is structurally preserved (kills the Array.isArray branch removal) returns a genuine array (not an index-keyed object) for a top-level array input"},{"id":"160","name":"array handling is structurally preserved (kills the Array.isArray branch removal) preserves nested arrays as arrays"}],"source":"/**\n * Mutation-hardening tests for audit-log redaction.\n *\n * Pins every secret-shaped key in REDACT_KEYS (so blanking any one literal to \"\" is caught) and\n * proves a top-level array stays an array after redaction (so dropping the `Array.isArray` branch\n * is caught — without it an array would be reshaped into an index-keyed object). Real teeth, no\n * tautologies.\n */\nimport { describe, expect, it } from 'vitest';\nimport { redactSecrets } from './audit-log.js';\n\ndescribe('every REDACT_KEYS entry is enforced (kills blanked-literal mutants)', () => {\n  // One assertion per key in the redaction set. If any literal were mutated to \"\", that key would\n  // no longer match and its secret value would survive — failing the corresponding case below.\n  const SECRET_KEYS = [\n    'apikey',\n    'apikeyplaintext',\n    'plaintext',\n    'secret',\n    'token',\n    'authorization',\n    'password',\n    'data',\n    'imagedata',\n    'bytes',\n  ];\n\n  it.each(SECRET_KEYS)('redacts the \"%s\" key', (key) => {\n    const out = redactSecrets({ [key]: 'super-secret-value' }) as Record<"+"string, unknown>;\n    expect(out[key]).toBe('[REDACTED]');\n  });\n\n  it.each(SECRET_KEYS)('redacts the \"%s\" key case-insensitively (upper-case)', (key) => {\n    const upper = key.toUpperCase();\n    const out = redactSecrets({ [upper]: 'super-secret-value' }) as Record<"+"string, unknown>;\n    expect(out[upper]).toBe('[REDACTED]');\n  });\n});\n\ndescribe('array handling is structurally preserved (kills the Array.isArray branch removal)', () => {\n  it('returns a genuine array (not an index-keyed object) for a top-level array input', () => {\n    const out = redactSecrets([{ apikey: 'x' }, { keep: 'y' }]);\n    expect(Array.isArray(out)).toBe(true); // dropping the array branch would yield a plain object\n    const arr = out as Array<"+"Record<"+"string, unknown>>;\n    expect(arr).toHaveLength(2);\n    expect(arr[0]!['apikey']).toBe('[REDACTED]');\n    expect(arr[1]!['keep']).toBe('y');\n  });\n\n  it('preserves nested arrays as arrays', () => {\n    const out = redactSecrets({ items: [{ secret: 's' }] }) as Record<"+"string, unknown>;\n    expect(Array.isArray(out['items'])).toBe(true);\n    expect((out['items'] as Array<"+"Record<"+"string, unknown>>)[0]!['secret']).toBe('[REDACTED]');\n  });\n});\n"},"src/index.test.ts":{"tests":[{"id":"161","name":"public barrel surface re-exports all controls as callable values"},{"id":"162","name":"public barrel surface the re-exported createApiKey/verifyApiKey round-trip works through the barrel"}],"source":"/**\n * Barrel smoke test: confirms the package surface re-exports every control so a consumer can\n * import them from the package root, and that the exports are the real implementations.\n */\nimport { describe, expect, it } from 'vitest';\nimport {\n  createApiKey,\n  verifyApiKey,\n  RateLimiter,\n  InMemoryRateLimitStore,\n  validateImageBytes,\n  validateImageRef,\n  sniffFormat,\n  parseDimensions,\n  InMemoryAuditSink,\n  redactSecrets,\n  PassthroughImageSanitizer,\n  DEFAULT_IMAGE_LIMITS,\n} from './index.js';\n\ndescribe('public barrel surface', () => {\n  it('re-exports all controls as callable values', () => {\n    for (const fn of [\n      createApiKey,\n      verifyApiKey,\n      validateImageBytes,\n      validateImageRef,\n      sniffFormat,\n      parseDimensions,\n      redactSecrets,\n    ]) {\n      expect(typeof fn).toBe('function');\n    }\n    expect(typeof RateLimiter).toBe('function'); // class\n    expect(typeof InMemoryRateLimitStore).toBe('function');\n    expect(typeof InMemoryAuditSink).toBe('function');\n    expect(typeof PassthroughImageSanitizer).toBe('function');\n    expect(DEFAULT_IMAGE_LIMITS.maxBytes).toBeGreaterThan(0);\n  });\n\n  it('the re-exported createApiKey/verifyApiKey round-trip works through the barrel', () => {\n    const { plaintext, record } = createApiKey({ tenantId: 't', scopes: [] });\n    expect(verifyApiKey(plaintext, record, { tenantId: 't' })).toEqual({ ok: true });\n  });\n});\n"}},"projectRoot":"C:\\dev\\TryIt\\packages\\security","config":{"packageManager":"pnpm","testRunner":"vitest","vitest":{"configFile":"vitest.config.ts","related":true},"coverageAnalysis":"perTest","plugins":["C:\\dev\\TryIt\\node_modules\\.pnpm\\@stryker-mutator+vitest-run_bbea4013cffb3385ea27b4cff1d06e94\\node_modules\\@stryker-mutator\\vitest-runner\\dist\\src\\index.js"],"concurrency":4,"timeoutMS":60000,"mutate":["src/**/*.ts","!src/**/*.test.ts","!src/**/*.test-helper.ts","!src/index.ts"],"reporters":["html","clear-text","json"],"htmlReporter":{"fileName":"reports/mutation/mutation.html"},"jsonReporter":{"fileName":"reports/mutation/mutation.json"},"tempDirName":".stryker-tmp","allowConsoleColors":true,"checkers":[],"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":{"baseUrl":"https://dashboard.stryker-mutator.io/api/reports","reportType":"full"},"dryRunOnly":false,"eventReporter":{"baseDir":"reports/mutation/events"},"ignorePatterns":[],"ignoreStatic":false,"incremental":false,"incrementalFile":"reports/stryker-incremental.json","force":false,"fileLogLevel":"off","inPlace":false,"logLevel":"info","maxConcurrentTestRunners":9007199
