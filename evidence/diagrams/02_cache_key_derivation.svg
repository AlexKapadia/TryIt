<text x="40" y="440" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-style="italic" fill="#888888">Two tenants can NEVER collide: tenantId is folded into the hashed material AND used as a literal key prefix. Length-prefixing blocks boundary-shift</text>
